<!DOCTYPE html>
<html>
<head>
    <title>Weather Cast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container"> 
        <h1>Weather Cast</h1>

        <input type="text" id="cityInput" placeholder="Enter city name">
        <button id="searchBtn">Search</button>
        
        <p id="errorMessage"></p>


        <div id="weatherResult">
            <h2 id="city"></h2>
            <p id="temp"></p>
            <p id="condition"></p>
            <p id="humidity"></p>
            <img id="icon">
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
<p id="errorMessage"></p>
